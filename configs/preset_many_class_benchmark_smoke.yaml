seed: 53

dataset:
  task: classification
  n_train: 256
  n_test: 256
  n_features_min: 8
  n_features_max: 24
  n_classes_min: 24
  n_classes_max: 24

graph:
  n_nodes_min: 2
  n_nodes_max: 12

runtime:
  device: cpu

output:
  out_dir: benchmarks/results/smoke_many_class
  shard_size: 16
  compression: zstd

diagnostics:
  enabled: false

steering:
  enabled: false

benchmark:
  profile_name: many_class_smoke
  suite: smoke
  num_datasets: 10
  warmup_datasets: 0
  warn_threshold_pct: 10.0
  fail_threshold_pct: 20.0
  collect_memory: false
  collect_reproducibility: false
  reproducibility_num_datasets: 1
  latency_num_samples: 5
  profiles:
    many_class_smoke:
      device: cpu
      num_datasets: 10
      warmup_datasets: 0

filter:
  enabled: false
