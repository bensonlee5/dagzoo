seed: 64

dataset:
  task: regression
  n_train: 128
  n_test: 32
  n_features_min: 8
  n_features_max: 12

graph:
  n_nodes_min: 8
  n_nodes_max: 12

shift:
  enabled: true
  profile: mixed

runtime:
  device: cpu

output:
  out_dir: data/run_shift_mixed_smoke
  shard_size: 16
  compression: zstd

diagnostics:
  enabled: false

steering:
  enabled: false

filter:
  enabled: false
