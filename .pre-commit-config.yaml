repos:

- repo: local
  hooks:
  - id: ruff-check
    name: ruff check
    entry: uv run ruff check
    language: system
    types_or: [python, pyi]
    pass_filenames: true
  - id: ruff-format
    name: ruff format
    entry: uv run ruff format
    language: system
    types_or: [python, pyi]
    pass_filenames: true
  - id: mypy
    name: mypy
    entry: ./.venv/bin/python -m mypy src
    language: system
    types_or: [python, pyi]
    pass_filenames: false
  - id: mdformat
    name: mdformat
    entry: uv run mdformat
    language: system
    types: [markdown]
    exclude: ^(WORKFLOW\.md|docs/transforms.md|site/)
    pass_filenames: true
