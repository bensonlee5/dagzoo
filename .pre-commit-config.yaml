repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        pass_filenames: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        pass_filenames: true
      - id: mdformat
        name: mdformat
        entry: uv run mdformat
        language: system
        types: [markdown]
        exclude: ^(docs/development/transforms\.md|site/)
        pass_filenames: true
