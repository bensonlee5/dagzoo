name: docs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "docs/**"
      - "site/**"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
      - "README.md"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "site/**"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
      - "README.md"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install docs build dependencies
        run: npm ci --prefix site

      - name: Sync docs content
        run: uv run python scripts/docs/sync_hugo_content.py

      - name: Verify docs sync (idempotence)
        run: uv run python scripts/docs/sync_hugo_content.py --check

      - name: Check docs links
        run: uv run python scripts/docs/check_links.py

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --group dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install docs build dependencies
        run: npm ci --prefix site

      - name: Sync docs content
        run: uv run python scripts/docs/sync_hugo_content.py

      - name: Setup Go (for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version-file: site/go.mod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.152.2"
          extended: true

      - name: Build site
        run: hugo --source site --minify --gc --destination public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
